version: "3.9"

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-labelwe}
      MYSQL_USER: ${MYSQL_USER:-labelwe}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ACCESS_TOKEN_HOURS: ${ACCESS_TOKEN_HOURS:-12}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      STORAGE_ROOT_NAME: ${STORAGE_ROOT_NAME:-workspace-samples}
      STORAGE_ROOT: ${STORAGE_ROOT:-/workspace/sample-data/images}
      EXPORT_ROOT: ${EXPORT_ROOT:-/workspace/sample-data/exports}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
      ALLOW_OPEN_REGISTRATION: ${ALLOW_OPEN_REGISTRATION:-false}
      SEED_DEMO_USERS: ${SEED_DEMO_USERS:-true}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_ADMIN_DISPLAY_NAME: ${BOOTSTRAP_ADMIN_DISPLAY_NAME:-Platform Admin}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4173,http://localhost:5173}
    ports:
      - "8000:8000"
    volumes:
      - ${HOST_STORAGE_ROOT:-./sample-data/images}:${STORAGE_ROOT:-/workspace/sample-data/images}:rw
      - ${HOST_EXPORT_ROOT:-./sample-data/exports}:${EXPORT_ROOT:-/workspace/sample-data/exports}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    restart: unless-stopped
    ports:
      - "4173:4173"
    depends_on:
      - backend

volumes:
  mysql-data:
